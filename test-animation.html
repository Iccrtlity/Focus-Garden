<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watering Animation Test</title>
  <style>
    body {
      background-color: #020617;
      color: white;
      font-family: system-ui;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .test-container {
      width: 400px;
      text-align: center;
    }

    .popup-preview {
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      width: 350px;
      margin: 0 auto 20px;
      position: relative;
    }

    .plant-card {
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 2rem;
      padding: 24px;
      text-align: center;
      position: relative;
      margin-top: 60px;
    }

    /* Watering Animation CSS */
    @keyframes gentle-pour {
      0%, 100% {
        transform: rotateZ(-8deg);
      }
      50% {
        transform: rotateZ(8deg);
      }
    }

    @keyframes water-drop {
      0% {
        transform: translateY(-8px);
        opacity: 1;
      }
      100% {
        transform: translateY(60px);
        opacity: 0;
      }
    }

    .watering-can {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      opacity: 0;
      pointer-events: none;
      transform-origin: center center;
    }

    .watering-can.is-watering {
      opacity: 1;
      animation: gentle-pour 1s ease-in-out infinite;
    }

    .watering-can svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
    }

    .watering-drops {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 80px;
      pointer-events: none;
    }

    .watering-drops.is-watering .water-drop {
      animation: water-drop 0.8s ease-in infinite;
    }

    .water-drop {
      position: absolute;
      width: 4px;
      height: 4px;
      background-color: #0ea5e9;
      border-radius: 50%;
      left: 50%;
      top: 0;
      margin-left: -2px;
    }

    .water-drop:nth-child(1) {
      animation-delay: 0s;
    }

    .water-drop:nth-child(2) {
      animation-delay: 0.2s;
    }

    .water-drop:nth-child(3) {
      animation-delay: 0.4s;
    }

    .water-drop:nth-child(4) {
      animation-delay: 0.6s;
    }

    .plant-image {
      width: 96px;
      height: 96px;
      margin: 20px auto;
      background-color: rgba(51, 65, 85, 0.3);
      border-radius: 8px;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      background-color: #22c55e;
      color: #020617;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button.pause {
      background-color: #0ea5e9;
    }

    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>🌱 Watering Animation Test</h1>
    
    <div class="plant-card">
      <div class="watering-can" id="watering-can">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <!-- Spout -->
          <path d="M 28 15 Q 32 12 35 10" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" />
          <!-- Can body -->
          <rect x="8" y="18" width="18" height="14" rx="2" fill="#64748b" stroke="#94a3b8" stroke-width="2" />
          <!-- Can opening -->
          <rect x="10" y="16" width="14" height="3" fill="#475569" stroke="#64748b" stroke-width="1" />
          <!-- Handle -->
          <path d="M 24 20 Q 28 18 28 24" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" />
        </svg>
      </div>
      
      <div class="watering-drops" id="watering-drops">
        <div class="water-drop"></div>
        <div class="water-drop"></div>
        <div class="water-drop"></div>
        <div class="water-drop"></div>
      </div>

      <div class="plant-image">🌱</div>
      <p style="color: #e2e8f0; font-weight: 600;">Timer Active</p>
    </div>

    <div class="controls">
      <button id="start-btn">Start</button>
      <button class="pause" id="stop-btn">Stop</button>
    </div>

    <div class="status" id="status">
      Animation is <span style="color: #94a3b8;">OFF</span>
    </div>
  </div>

  <script>
    const wateringCan = document.getElementById('watering-can');
    const wateringDrops = document.getElementById('watering-drops');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const status = document.getElementById('status');

    function startAnimation() {
      wateringCan.classList.add('is-watering');
      wateringDrops.classList.add('is-watering');
      status.innerHTML = 'Animation is <span style="color: #22c55e;">ON</span> ✓';
    }

    function stopAnimation() {
      wateringCan.classList.remove('is-watering');
      wateringDrops.classList.remove('is-watering');
      status.innerHTML = 'Animation is <span style="color: #94a3b8;">OFF</span>';
    }

    startBtn.addEventListener('click', startAnimation);
    stopBtn.addEventListener('click', stopAnimation);
  </script>
</body>
</html>
